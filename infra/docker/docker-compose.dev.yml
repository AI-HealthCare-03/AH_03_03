name: ai-health-dev

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-health-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ai_health}
      POSTGRES_USER: ${DB_USER:-ozcoding}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-PLEASE_CHANGE_ME}
      TZ: Asia/Seoul
    ports:
      - "${DB_EXPOSE_PORT:-5432}:5432"
    volumes:
      - ai_health_dev_postgres_data:/var/lib/postgresql/data
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ozcoding} -d ${DB_NAME:-ai_health}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-health-dev-redis
    restart: unless-stopped
    ports:
      - "${REDIS_EXPOSE_PORT:-6379}:6379"
    networks:
      - app
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  fastapi:
    container_name: ai-health-dev-fastapi
    build:
      context: ../..
      dockerfile: app/Dockerfile
    command: uv run --no-sync uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      ENV: ${ENV:-local}
      SECRET_KEY: ${SECRET_KEY:-PLEASE_CHANGE_ME}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-localhost}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-ozcoding}
      DB_PASSWORD: ${DB_PASSWORD:-PLEASE_CHANGE_ME}
      DB_NAME: ${DB_NAME:-ai_health}
      DB_POOL_MIN_SIZE: ${DB_POOL_MIN_SIZE:-1}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-5}
      DB_COMMAND_TIMEOUT: ${DB_COMMAND_TIMEOUT:-60}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      UPLOAD_STORAGE_DIR: ${UPLOAD_STORAGE_DIR:-var/uploads}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_STORAGE_ROOT: ${LOCAL_STORAGE_ROOT:-var/storage}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_REGION: ${S3_REGION:-ap-northeast-2}
      S3_PREFIX: ${S3_PREFIX:-ai-health/dev}
      S3_PRESIGNED_URL_EXPIRES_SECONDS: ${S3_PRESIGNED_URL_EXPIRES_SECONDS:-3600}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      EMAIL_VERIFICATION_DEBUG: ${EMAIL_VERIFICATION_DEBUG:-true}
      PASSWORD_RESET_DEBUG: ${PASSWORD_RESET_DEBUG:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-AI HealthCare}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:8080}
      CHATBOT_USE_REAL_LLM: ${CHATBOT_USE_REAL_LLM:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      RAG_ENABLED: ${RAG_ENABLED:-false}
      DIET_GPT_VISION_ENABLED: ${DIET_GPT_VISION_ENABLED:-false}
      DIET_GPT_VISION_MODEL: ${DIET_GPT_VISION_MODEL:-gpt-4o-mini}
      DIET_VISION_PROVIDER: ${DIET_VISION_PROVIDER:-rule_based}
      EXAM_OCR_PROVIDER: ${EXAM_OCR_PROVIDER:-fallback}
      EXAM_GPT_VISION_ENABLED: ${EXAM_GPT_VISION_ENABLED:-false}
      EXAM_GPT_VISION_MODEL: ${EXAM_GPT_VISION_MODEL:-gpt-4o-mini}
      PADDLE_OCR_ENABLED: ${PADDLE_OCR_ENABLED:-false}
      MEDICATION_OCR_PROVIDER: ${MEDICATION_OCR_PROVIDER:-fallback}
      MEDICATION_GPT_VISION_ENABLED: ${MEDICATION_GPT_VISION_ENABLED:-false}
      MEDICATION_GPT_VISION_MODEL: ${MEDICATION_GPT_VISION_MODEL:-gpt-4o-mini}
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse-web:3000}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-http://host.docker.internal:3000}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
    volumes:
      - ../../app:/app/app
      - ai_health_dev_uploads:/app/var/uploads
      - ai_health_dev_storage:/app/var/storage
    ports:
      - "8000:8000"
    networks:
      - app
      - ai-health-shared
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/system/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ai-worker:
    container_name: ai-health-dev-ai-worker
    build:
      context: ../..
      dockerfile: ai_runtime/Dockerfile
    environment:
      ENV: ${ENV:-local}
      SECRET_KEY: ${SECRET_KEY:-PLEASE_CHANGE_ME}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-ozcoding}
      DB_PASSWORD: ${DB_PASSWORD:-PLEASE_CHANGE_ME}
      DB_NAME: ${DB_NAME:-ai_health}
      DB_POOL_MIN_SIZE: ${DB_POOL_MIN_SIZE:-1}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-5}
      DB_COMMAND_TIMEOUT: ${DB_COMMAND_TIMEOUT:-60}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      UPLOAD_STORAGE_DIR: ${UPLOAD_STORAGE_DIR:-var/uploads}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_STORAGE_ROOT: ${LOCAL_STORAGE_ROOT:-var/storage}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_REGION: ${S3_REGION:-ap-northeast-2}
      S3_PREFIX: ${S3_PREFIX:-ai-health/dev}
      S3_PRESIGNED_URL_EXPIRES_SECONDS: ${S3_PRESIGNED_URL_EXPIRES_SECONDS:-3600}
      CHATBOT_USE_REAL_LLM: ${CHATBOT_USE_REAL_LLM:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      RAG_ENABLED: ${RAG_ENABLED:-false}
      DIET_GPT_VISION_ENABLED: ${DIET_GPT_VISION_ENABLED:-false}
      DIET_GPT_VISION_MODEL: ${DIET_GPT_VISION_MODEL:-gpt-4o-mini}
      DIET_VISION_PROVIDER: ${DIET_VISION_PROVIDER:-rule_based}
      EXAM_OCR_PROVIDER: ${EXAM_OCR_PROVIDER:-fallback}
      EXAM_GPT_VISION_ENABLED: ${EXAM_GPT_VISION_ENABLED:-false}
      EXAM_GPT_VISION_MODEL: ${EXAM_GPT_VISION_MODEL:-gpt-4o-mini}
      PADDLE_OCR_ENABLED: ${PADDLE_OCR_ENABLED:-false}
      MEDICATION_OCR_PROVIDER: ${MEDICATION_OCR_PROVIDER:-fallback}
      MEDICATION_GPT_VISION_ENABLED: ${MEDICATION_GPT_VISION_ENABLED:-false}
      MEDICATION_GPT_VISION_MODEL: ${MEDICATION_GPT_VISION_MODEL:-gpt-4o-mini}
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse-web:3000}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-http://host.docker.internal:3000}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
    restart: unless-stopped
    volumes:
      - ai_health_dev_uploads:/app/var/uploads
      - ai_health_dev_storage:/app/var/storage
    networks:
      - app
      - ai-health-shared
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    container_name: ai-health-dev-frontend
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID:-}
        VITE_FIREBASE_VAPID_KEY: ${VITE_FIREBASE_VAPID_KEY:-}
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - app
    depends_on:
      fastapi:
        condition: service_healthy

  nginx:
    container_name: ai-health-dev-nginx
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ../nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    networks:
      - app
    depends_on:
      frontend:
        condition: service_started
      fastapi:
        condition: service_healthy

volumes:
  ai_health_dev_postgres_data:
  ai_health_dev_uploads:
  ai_health_dev_storage:

networks:
  app:
    name: ai-health-dev-app
    driver: bridge
  ai-health-shared:
    external: true
