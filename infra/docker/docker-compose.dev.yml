name: ai-health-dev

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-health-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ai_health}
      POSTGRES_USER: ${DB_USER:-ozcoding}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-PLEASE_CHANGE_ME}
      TZ: Asia/Seoul
    ports:
      - "${DB_EXPOSE_PORT:-5432}:5432"
    volumes:
      - ai_health_dev_postgres_data:/var/lib/postgresql/data
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ozcoding} -d ${DB_NAME:-ai_health}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-health-dev-redis
    restart: unless-stopped
    ports:
      - "${REDIS_EXPOSE_PORT:-6379}:6379"
    networks:
      - app
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  fastapi:
    container_name: ai-health-dev-fastapi
    build:
      context: ../..
      dockerfile: app/Dockerfile
    command: uv run --no-sync uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      ENV: ${ENV:-local}
      SECRET_KEY: ${SECRET_KEY:-PLEASE_CHANGE_ME}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-localhost}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-ozcoding}
      DB_PASSWORD: ${DB_PASSWORD:-PLEASE_CHANGE_ME}
      DB_NAME: ${DB_NAME:-ai_health}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse-web:3000}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
    volumes:
      - ../../app:/app/app
    ports:
      - "8000:8000"
    networks:
      - app
      - ai-health-shared
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/system/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ai-worker:
    container_name: ai-health-dev-ai-worker
    build:
      context: ../..
      dockerfile: ai_runtime/Dockerfile
    environment:
      ENV: ${ENV:-local}
      SECRET_KEY: ${SECRET_KEY:-PLEASE_CHANGE_ME}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-ozcoding}
      DB_PASSWORD: ${DB_PASSWORD:-PLEASE_CHANGE_ME}
      DB_NAME: ${DB_NAME:-ai_health}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse-web:3000}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
    volumes:
      - ../../ai_runtime:/app/ai_runtime
    restart: unless-stopped
    networks:
      - app
      - ai-health-shared
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    container_name: ai-health-dev-frontend
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - app
    depends_on:
      fastapi:
        condition: service_healthy

  nginx:
    container_name: ai-health-dev-nginx
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ../nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    networks:
      - app
    depends_on:
      frontend:
        condition: service_started
      fastapi:
        condition: service_healthy

volumes:
  ai_health_dev_postgres_data:

networks:
  app:
    name: ai-health-dev-app
    driver: bridge
  ai-health-shared:
    external: true
