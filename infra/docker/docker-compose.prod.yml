services:
  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    networks:
      - ws
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-ai_health}
      POSTGRES_USER: ${DB_USER:-ozcoding}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-PLEASE_CHANGE_ME}
      TZ: Asia/Seoul
    networks:
      - ws
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ozcoding} -d ${DB_NAME:-ai_health}"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    container_name: fastapi
    image: ${DOCKER_USER:-ozcodingschool}/${DOCKER_REPOSITORY:-ai-health}:app-${APP_VERSION:-v1.0.0}
    environment:
      ENV: ${ENV:-prod}
      SECRET_KEY: ${SECRET_KEY:-PLEASE_CHANGE_ME}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-localhost}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-ozcoding}
      DB_PASSWORD: ${DB_PASSWORD:-PLEASE_CHANGE_ME}
      DB_NAME: ${DB_NAME:-ai_health}
      DB_POOL_MIN_SIZE: ${DB_POOL_MIN_SIZE:-1}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-5}
      DB_COMMAND_TIMEOUT: ${DB_COMMAND_TIMEOUT:-60}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      UPLOAD_STORAGE_DIR: ${UPLOAD_STORAGE_DIR:-var/uploads}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      LOCAL_STORAGE_ROOT: ${LOCAL_STORAGE_ROOT:-var/storage}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_REGION: ${S3_REGION:-ap-northeast-2}
      S3_PREFIX: ${S3_PREFIX:-ai-health/prod}
      S3_PRESIGNED_URL_EXPIRES_SECONDS: ${S3_PRESIGNED_URL_EXPIRES_SECONDS:-3600}
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
      RAG_ENABLED: ${RAG_ENABLED:-false}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse-web:3000}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
    restart: always
    volumes:
      - upload_volume:/app/var/uploads
      - storage_volume:/app/var/storage
    expose:
      - "8000"
    networks:
      - ws
      - ai-health-shared
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/system/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ai-worker:
    container_name: ai-worker
    image: ${DOCKER_USER:-ozcodingschool}/${DOCKER_REPOSITORY:-ai-health}:ai-${AI_WORKER_VERSION:-v1.0.0}
    environment:
      ENV: ${ENV:-prod}
      SECRET_KEY: ${SECRET_KEY:-PLEASE_CHANGE_ME}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-ozcoding}
      DB_PASSWORD: ${DB_PASSWORD:-PLEASE_CHANGE_ME}
      DB_NAME: ${DB_NAME:-ai_health}
      DB_POOL_MIN_SIZE: ${DB_POOL_MIN_SIZE:-1}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-5}
      DB_COMMAND_TIMEOUT: ${DB_COMMAND_TIMEOUT:-60}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      UPLOAD_STORAGE_DIR: ${UPLOAD_STORAGE_DIR:-var/uploads}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      LOCAL_STORAGE_ROOT: ${LOCAL_STORAGE_ROOT:-var/storage}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_REGION: ${S3_REGION:-ap-northeast-2}
      S3_PREFIX: ${S3_PREFIX:-ai-health/prod}
      S3_PRESIGNED_URL_EXPIRES_SECONDS: ${S3_PRESIGNED_URL_EXPIRES_SECONDS:-3600}
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
      RAG_ENABLED: ${RAG_ENABLED:-false}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse-web:3000}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
    restart: always
    mem_limit: 4G
    volumes:
      - upload_volume:/app/var/uploads
      - storage_volume:/app/var/storage
    networks:
      - ws
      - ai-health-shared
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    container_name: frontend
    image: ${DOCKER_USER:-ozcodingschool}/${DOCKER_REPOSITORY:-ai-health}:frontend-${FRONTEND_VERSION:-v1.0.0}
    restart: always
    expose:
      - "80"
    networks:
      - ws
    depends_on:
      fastapi:
        condition: service_healthy

  nginx:
    container_name: nginx
    image: nginx:latest
    volumes:
      - ../nginx/prod_http.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/vol/web/static
      - media_volume:/vol/web/media
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    ports:
      - "80:80"
    networks:
      - ws
    depends_on:
      frontend:
        condition: service_started
      fastapi:
        condition: service_healthy

  certbot:
    image: certbot/certbot
    container_name: auto-certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 48h & wait $${!}; done;'"
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - nginx

volumes:
  postgres_data:
    name: postgres_data
  static_volume:
    name: static_volume
  media_volume:
    name: media_volume
  upload_volume:
    name: upload_volume
  storage_volume:
    name: storage_volume
  certbot-conf:
    name: certbot-conf
  certbot-www:
    name: certbot-www

networks:
  ws:
    name: ws
    driver: bridge
  ai-health-shared:
    external: true
