services:
  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - ws
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-ai_health}
      POSTGRES_USER: ${DB_USER:-ozcoding}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-PLEASE_CHANGE_ME}
      TZ: Asia/Seoul
    networks:
      - ws
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ozcoding} -d ${DB_NAME:-ai_health}"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    container_name: fastapi
    image: ${DOCKER_USER:-kdu0312}/${DOCKER_REPOSITORY:-ai-health}:app-${APP_VERSION:-v1.0.0}
    environment:
      ENV: ${ENV:-prod}
      SECRET_KEY: ${SECRET_KEY:-PLEASE_CHANGE_ME}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-localhost}
      REFRESH_TOKEN_COOKIE_NAME: ${REFRESH_TOKEN_COOKIE_NAME:-refresh_token}
      REFRESH_TOKEN_COOKIE_PATH: ${REFRESH_TOKEN_COOKIE_PATH:-/api/v1/auth}
      REFRESH_TOKEN_COOKIE_SAMESITE: ${REFRESH_TOKEN_COOKIE_SAMESITE:-lax}
      REFRESH_TOKEN_COOKIE_SECURE: ${REFRESH_TOKEN_COOKIE_SECURE:-true}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-https://your-frontend-domain.example}
      LOGIN_FAILURE_LIMIT: ${LOGIN_FAILURE_LIMIT:-5}
      LOGIN_SOFT_LOCK_MINUTES: ${LOGIN_SOFT_LOCK_MINUTES:-1}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-ozcoding}
      DB_PASSWORD: ${DB_PASSWORD:-PLEASE_CHANGE_ME}
      DB_NAME: ${DB_NAME:-ai_health}
      DB_POOL_MIN_SIZE: ${DB_POOL_MIN_SIZE:-1}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-5}
      DB_COMMAND_TIMEOUT: ${DB_COMMAND_TIMEOUT:-60}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-false}
      SCHEDULER_INTERVAL_SECONDS: ${SCHEDULER_INTERVAL_SECONDS:-60}
      UPLOAD_STORAGE_DIR: ${UPLOAD_STORAGE_DIR:-var/uploads}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_STORAGE_ROOT: ${LOCAL_STORAGE_ROOT:-var/storage}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_REGION: ${S3_REGION:-ap-northeast-2}
      S3_PREFIX: ${S3_PREFIX:-ai-health/}
      S3_PRESIGNED_URL_EXPIRES_SECONDS: ${S3_PRESIGNED_URL_EXPIRES_SECONDS:-3600}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-true}
      EMAIL_VERIFICATION_DEBUG: ${EMAIL_VERIFICATION_DEBUG:-false}
      PASSWORD_RESET_DEBUG: ${PASSWORD_RESET_DEBUG:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-AI HealthCare}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-https://your-frontend-domain.example}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0}
      CHATBOT_USE_REAL_LLM: ${CHATBOT_USE_REAL_LLM:-false}
      RAG_RETRIEVAL_STRATEGY: ${RAG_RETRIEVAL_STRATEGY:-keyword_only}
      MAIN_CHATBOT_RAG_STRATEGY: ${MAIN_CHATBOT_RAG_STRATEGY:-keyword_only}
      DIET_GPT_VISION_ENABLED: ${DIET_GPT_VISION_ENABLED:-false}
      DIET_GPT_VISION_MODEL: ${DIET_GPT_VISION_MODEL:-gpt-4o}
      DIET_VISION_PROVIDER: ${DIET_VISION_PROVIDER:-rule_based}
      DIET_DEMO_FALLBACK_ENABLED: ${DIET_DEMO_FALLBACK_ENABLED:-false}
      DIET_MFDS_ENABLED: ${DIET_MFDS_ENABLED:-false}
      MFDS_SERVICE_KEY: ${MFDS_SERVICE_KEY:-}
      MFDS_SERVICE_KEY_ENCODED: ${MFDS_SERVICE_KEY_ENCODED:-}
      DIET_MFDS_TIMEOUT_SECONDS: ${DIET_MFDS_TIMEOUT_SECONDS:-5}
      DIET_MFDS_MAX_CANDIDATES: ${DIET_MFDS_MAX_CANDIDATES:-5}
      EXAM_OCR_PROVIDER: ${EXAM_OCR_PROVIDER:-fallback}
      EXAM_GPT_VISION_ENABLED: ${EXAM_GPT_VISION_ENABLED:-false}
      EXAM_GPT_VISION_MODEL: ${EXAM_GPT_VISION_MODEL:-gpt-4o}
      PADDLE_OCR_ENABLED: ${PADDLE_OCR_ENABLED:-false}
      GPT_VISION_FALLBACK_ENABLED: ${GPT_VISION_FALLBACK_ENABLED:-false}
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
      RAG_ENABLED: ${RAG_ENABLED:-true}
      ANALYSIS_EXPLANATION_LLM_REWRITE_ENABLED: ${ANALYSIS_EXPLANATION_LLM_REWRITE_ENABLED:-false}
      DIET_RECOMMENDATION_LLM_REWRITE_ENABLED: ${DIET_RECOMMENDATION_LLM_REWRITE_ENABLED:-false}
      DIET_RECOMMENDATION_RAG_STRATEGY: ${DIET_RECOMMENDATION_RAG_STRATEGY:-keyword_only}
      RAG_EMBEDDING_ENABLED: ${RAG_EMBEDDING_ENABLED:-false}
      RAG_EMBEDDING_PROVIDER: ${RAG_EMBEDDING_PROVIDER:-disabled}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-text-embedding-3-small}
      RAG_EMBEDDING_DIMENSION: ${RAG_EMBEDDING_DIMENSION:-1536}
      RAG_EMBEDDING_BATCH_SIZE: ${RAG_EMBEDDING_BATCH_SIZE:-64}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse-web:3000}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
    restart: always
    volumes:
      - upload_volume:/app/var/uploads
      - storage_volume:/app/var/storage
    expose:
      - "8000"
    networks:
      - ws
      - ai-health-shared
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/system/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ai-worker:
    container_name: ai-worker
    image: ${DOCKER_USER:-kdu0312}/${DOCKER_REPOSITORY:-ai-health}:ai-${AI_WORKER_VERSION:-v1.0.0}
    environment:
      ENV: ${ENV:-prod}
      SECRET_KEY: ${SECRET_KEY:-PLEASE_CHANGE_ME}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-localhost}
      REFRESH_TOKEN_COOKIE_NAME: ${REFRESH_TOKEN_COOKIE_NAME:-refresh_token}
      REFRESH_TOKEN_COOKIE_PATH: ${REFRESH_TOKEN_COOKIE_PATH:-/api/v1/auth}
      REFRESH_TOKEN_COOKIE_SAMESITE: ${REFRESH_TOKEN_COOKIE_SAMESITE:-lax}
      REFRESH_TOKEN_COOKIE_SECURE: ${REFRESH_TOKEN_COOKIE_SECURE:-true}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-https://your-frontend-domain.example}
      LOGIN_FAILURE_LIMIT: ${LOGIN_FAILURE_LIMIT:-5}
      LOGIN_SOFT_LOCK_MINUTES: ${LOGIN_SOFT_LOCK_MINUTES:-1}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-ozcoding}
      DB_PASSWORD: ${DB_PASSWORD:-PLEASE_CHANGE_ME}
      DB_NAME: ${DB_NAME:-ai_health}
      DB_POOL_MIN_SIZE: ${DB_POOL_MIN_SIZE:-1}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-5}
      DB_COMMAND_TIMEOUT: ${DB_COMMAND_TIMEOUT:-60}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-false}
      SCHEDULER_INTERVAL_SECONDS: ${SCHEDULER_INTERVAL_SECONDS:-60}
      UPLOAD_STORAGE_DIR: ${UPLOAD_STORAGE_DIR:-var/uploads}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_STORAGE_ROOT: ${LOCAL_STORAGE_ROOT:-var/storage}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_REGION: ${S3_REGION:-ap-northeast-2}
      S3_PREFIX: ${S3_PREFIX:-ai-health/}
      S3_PRESIGNED_URL_EXPIRES_SECONDS: ${S3_PRESIGNED_URL_EXPIRES_SECONDS:-3600}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-true}
      EMAIL_VERIFICATION_DEBUG: ${EMAIL_VERIFICATION_DEBUG:-false}
      PASSWORD_RESET_DEBUG: ${PASSWORD_RESET_DEBUG:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-AI HealthCare}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-https://your-frontend-domain.example}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0}
      CHATBOT_USE_REAL_LLM: ${CHATBOT_USE_REAL_LLM:-false}
      RAG_RETRIEVAL_STRATEGY: ${RAG_RETRIEVAL_STRATEGY:-keyword_only}
      MAIN_CHATBOT_RAG_STRATEGY: ${MAIN_CHATBOT_RAG_STRATEGY:-keyword_only}
      DIET_GPT_VISION_ENABLED: ${DIET_GPT_VISION_ENABLED:-false}
      DIET_GPT_VISION_MODEL: ${DIET_GPT_VISION_MODEL:-gpt-4o}
      DIET_VISION_PROVIDER: ${DIET_VISION_PROVIDER:-rule_based}
      DIET_DEMO_FALLBACK_ENABLED: ${DIET_DEMO_FALLBACK_ENABLED:-false}
      DIET_MFDS_ENABLED: ${DIET_MFDS_ENABLED:-false}
      MFDS_SERVICE_KEY: ${MFDS_SERVICE_KEY:-}
      MFDS_SERVICE_KEY_ENCODED: ${MFDS_SERVICE_KEY_ENCODED:-}
      DIET_MFDS_TIMEOUT_SECONDS: ${DIET_MFDS_TIMEOUT_SECONDS:-5}
      DIET_MFDS_MAX_CANDIDATES: ${DIET_MFDS_MAX_CANDIDATES:-5}
      EXAM_OCR_PROVIDER: ${EXAM_OCR_PROVIDER:-fallback}
      EXAM_GPT_VISION_ENABLED: ${EXAM_GPT_VISION_ENABLED:-false}
      EXAM_GPT_VISION_MODEL: ${EXAM_GPT_VISION_MODEL:-gpt-4o}
      PADDLE_OCR_ENABLED: ${PADDLE_OCR_ENABLED:-false}
      GPT_VISION_FALLBACK_ENABLED: ${GPT_VISION_FALLBACK_ENABLED:-false}
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
      RAG_ENABLED: ${RAG_ENABLED:-true}
      ANALYSIS_EXPLANATION_LLM_REWRITE_ENABLED: ${ANALYSIS_EXPLANATION_LLM_REWRITE_ENABLED:-false}
      DIET_RECOMMENDATION_LLM_REWRITE_ENABLED: ${DIET_RECOMMENDATION_LLM_REWRITE_ENABLED:-false}
      DIET_RECOMMENDATION_RAG_STRATEGY: ${DIET_RECOMMENDATION_RAG_STRATEGY:-keyword_only}
      RAG_EMBEDDING_ENABLED: ${RAG_EMBEDDING_ENABLED:-false}
      RAG_EMBEDDING_PROVIDER: ${RAG_EMBEDDING_PROVIDER:-disabled}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-text-embedding-3-small}
      RAG_EMBEDDING_DIMENSION: ${RAG_EMBEDDING_DIMENSION:-1536}
      RAG_EMBEDDING_BATCH_SIZE: ${RAG_EMBEDDING_BATCH_SIZE:-64}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse-web:3000}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
    restart: always
    mem_limit: 4G
    volumes:
      - upload_volume:/app/var/uploads
      - storage_volume:/app/var/storage
    networks:
      - ws
      - ai-health-shared
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    container_name: frontend
    image: ${DOCKER_USER:-kdu0312}/${DOCKER_REPOSITORY:-ai-health}:frontend-${FRONTEND_VERSION:-v1.0.0}
    restart: always
    expose:
      - "80"
    networks:
      - ws
    depends_on:
      fastapi:
        condition: service_healthy

  nginx:
    container_name: nginx
    image: nginx:latest
    volumes:
      - ${NGINX_CONF:-../nginx/prod_https.conf}:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/vol/web/static
      - media_volume:/vol/web/media
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    networks:
      - ws
    depends_on:
      frontend:
        condition: service_started
      fastapi:
        condition: service_healthy

  certbot:
    image: certbot/certbot
    container_name: auto-certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 48h & wait $${!}; done;'"
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - nginx

volumes:
  postgres_data:
    name: postgres_data
  redis_data:
    name: redis_data
  static_volume:
    name: static_volume
  media_volume:
    name: media_volume
  upload_volume:
    name: upload_volume
  storage_volume:
    name: storage_volume
  certbot-conf:
    name: certbot-conf
  certbot-www:
    name: certbot-www

networks:
  ws:
    name: ws
    driver: bridge
  ai-health-shared:
    external: true
