name: deploy-prod

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('deploy-prod-pr-{0}', github.event.pull_request.number) || 'deploy-prod-production' }}
  cancel-in-progress: false

env:
  DOCKER_IMAGE_REPOSITORY: kdu0312/ai-health
  DOCKER_PLATFORM: linux/amd64
  VITE_API_BASE_URL: /api/v1

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: uv sync --group app --group ai --group dev --frozen

      - name: Ruff format check
        run: uv run ruff format app scripts ai_runtime tests --check

      - name: Ruff lint
        run: uv run ruff check app scripts ai_runtime tests

      - name: Pytest
        run: uv run pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Compose config check
        run: docker compose --env-file envs/example.prod.env -f infra/docker/docker-compose.prod.yml config --quiet

  build-push:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    outputs:
      image_tag: ${{ steps.version.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: version
        run: |
          short_sha="${GITHUB_SHA::12}"
          echo "image_tag=main-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: app/Dockerfile
          platforms: ${{ env.DOCKER_PLATFORM }}
          push: true
          tags: ${{ env.DOCKER_IMAGE_REPOSITORY }}:app-${{ steps.version.outputs.image_tag }}

      - name: Build and push ai-worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ai_runtime/Dockerfile
          platforms: ${{ env.DOCKER_PLATFORM }}
          push: true
          tags: ${{ env.DOCKER_IMAGE_REPOSITORY }}:ai-${{ steps.version.outputs.image_tag }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          platforms: ${{ env.DOCKER_PLATFORM }}
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
          tags: ${{ env.DOCKER_IMAGE_REPOSITORY }}:frontend-${{ steps.version.outputs.image_tag }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/prod_deploy_key
          chmod 600 ~/.ssh/prod_deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          DEPLOY_TAG: ${{ needs.build-push.outputs.image_tag }}
        run: |
          ssh -i ~/.ssh/prod_deploy_key "$EC2_USER@$EC2_HOST" "DEPLOY_TAG='$DEPLOY_TAG' bash -s" <<'REMOTE'
          set -euo pipefail

          cd ~/AH_03_03

          git fetch origin
          git reset --hard origin/main

          test -f .prod.env

          update_env_key() {
            key="$1"
            value="$2"
            file=".prod.env"
            if grep -q "^${key}=" "$file"; then
              sed -i "s|^${key}=.*|${key}=${value}|" "$file"
            else
              printf '\n%s=%s\n' "$key" "$value" >> "$file"
            fi
          }

          update_env_key APP_VERSION "$DEPLOY_TAG"
          update_env_key AI_WORKER_VERSION "$DEPLOY_TAG"
          update_env_key FRONTEND_VERSION "$DEPLOY_TAG"

          make prod-pull
          make prod-up
          make prod-migrate
          make prod-health
          curl -fsS https://healthladder.duckdns.org/api/v1/system/health
          REMOTE
