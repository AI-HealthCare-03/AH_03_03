<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>건강 AI 분석 · 데모</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --accent: #3fb950;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --text-dim: #484f58;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,17,23,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .header-logo {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .header-title { font-size: 16px; font-weight: 600; }
  .header-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .api-badge {
    margin-left: auto;
    font-size: 10px; font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    background: rgba(63,185,80,0.12);
    color: var(--accent);
    border: 1px solid rgba(63,185,80,0.25);
  }

  /* 서버 URL 설정 바 */
  .server-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .server-bar label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .server-bar input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px; color: var(--text);
    outline: none;
    font-family: 'Fira Code', monospace;
  }
  .server-bar input:focus { border-color: var(--accent2); }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-dim); flex-shrink: 0;
    transition: background 0.3s;
  }
  .status-dot.ok { background: var(--accent); }
  .status-dot.err { background: var(--accent3); }

  .tabs {
    display: flex; gap: 6px;
    padding: 16px 20px 0;
    overflow-x: auto; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: 8px 16px;
    border-radius: 20px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted);
    transition: all 0.2s; white-space: nowrap;
  }
  .tab.active {
    background: var(--accent); border-color: var(--accent);
    color: #0d1117; font-weight: 600;
  }

  .main { padding: 20px; max-width: 480px; margin: 0 auto; }

  .upload-zone {
    position: relative;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    min-height: 220px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; cursor: pointer;
    transition: all 0.25s; overflow: hidden;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(63,185,80,0.04);
  }
  .preview-img {
    display: none; width: 100%; height: 100%;
    object-fit: cover; position: absolute; inset: 0;
    border-radius: calc(var(--radius) - 2px);
  }
  .preview-overlay {
    display: none; position: absolute; inset: 0;
    background: rgba(0,0,0,0.5);
    align-items: center; justify-content: center;
    border-radius: calc(var(--radius) - 2px);
    flex-direction: column; gap: 8px;
  }
  .preview-overlay span { font-size: 13px; color: #fff; }
  .upload-icon {
    width: 56px; height: 56px; background: var(--surface2);
    border-radius: 14px; display: flex; align-items: center;
    justify-content: center; font-size: 26px;
    border: 1px solid var(--border);
  }
  .upload-label { font-size: 15px; font-weight: 600; }
  .upload-sub { font-size: 12px; color: var(--text-muted); text-align: center; line-height: 1.6; }

  .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 7px;
    padding: 13px 16px; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .btn::after { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0.08); opacity: 0; transition: opacity 0.15s; }
  .btn:active::after { opacity: 1; }
  .btn-camera, .btn-gallery { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
  .btn-analyze {
    grid-column: 1/-1; background: var(--accent);
    color: #0d1117; font-size: 15px; padding: 15px;
  }
  .btn-analyze:disabled { background: var(--surface2); color: var(--text-dim); cursor: not-allowed; }
  .btn-analyze:disabled::after { display: none; }

  .info-chip {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--text-muted);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 10px; margin-bottom: 14px;
  }

  .result-section { margin-top: 24px; display: none; }
  .result-section.visible { display: block; }

  .result-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .result-header h3 { font-size: 15px; font-weight: 600; }
  .badge { padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-success { background: rgba(63,185,80,0.15); color: var(--accent); }
  .badge-warn { background: rgba(247,129,102,0.15); color: var(--accent3); }

  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
  }
  .result-card-title {
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;
  }

  .food-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .food-item:last-child { border-bottom: none; padding-bottom: 0; }
  .food-emoji { font-size: 22px; width: 36px; text-align: center; }
  .food-info { flex: 1; }
  .food-name { font-size: 14px; font-weight: 600; }
  .food-cat { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .confidence-bar { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .bar-track { flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.6s ease; }
  .bar-fill.medium { background: #e3b341; }
  .bar-fill.low { background: var(--accent3); }
  .conf-num { font-size: 11px; color: var(--text-muted); width: 32px; text-align: right; }

  .med-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .med-item:last-child { border-bottom: none; }
  .med-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .med-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .med-tag { font-size: 11px; padding: 2px 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text-muted); }
  .dosage-selector { margin-top: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; }
  .dosage-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
  .dosage-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .pill { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); font-size: 12px; cursor: pointer; color: var(--text-muted); transition: all 0.15s; background: transparent; }
  .pill.selected { background: var(--accent2); border-color: var(--accent2); color: #0d1117; font-weight: 600; }

  .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .metric-item { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; }
  .metric-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .metric-value { font-size: 20px; font-weight: 700; }
  .metric-unit { font-size: 11px; color: var(--text-muted); margin-left: 2px; }

  .loading-box { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 32px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text-muted); }
  .loading-dots::after { content: ''; animation: dots 1.5s steps(3,end) infinite; }
  @keyframes dots { 0%{content:''} 33%{content:'.'} 66%{content:'..'} 100%{content:'...'} }

  .confirm-banner { display: flex; align-items: flex-start; gap: 10px; background: rgba(247,129,102,0.08); border: 1px solid rgba(247,129,102,0.3); border-radius: var(--radius-sm); padding: 12px; margin-top: 10px; font-size: 12px; color: var(--accent3); line-height: 1.5; }
  .info-banner { background: rgba(88,166,255,0.08); border-color: rgba(88,166,255,0.3); color: var(--accent2); }

  .json-toggle { margin-top: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .json-toggle-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-muted); }
  .json-toggle-header:hover { background: var(--surface2); }
  .json-body { display: none; padding: 14px 16px; border-top: 1px solid var(--border); }
  .json-body.open { display: block; }
  pre { font-size: 11px; line-height: 1.7; color: var(--accent2); white-space: pre-wrap; word-break: break-all; font-family: 'Fira Code', monospace; }

  .btn-save { width: 100%; margin-top: 14px; background: var(--surface2); border: 1px solid var(--accent2); color: var(--accent2); padding: 13px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: all 0.2s; }
  .btn-save:hover { background: rgba(88,166,255,0.1); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  .main > * { animation: fadeUp 0.3s ease both; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🏥</div>
  <div>
    <div class="header-title">건강 AI 분석</div>
    <div class="header-sub">GPT Vision · gpt-4o-mini</div>
  </div>
  <div class="api-badge">DEMO</div>
</div>

<!-- 서버 URL 설정 -->
<div class="server-bar">
  <div class="status-dot" id="statusDot"></div>
  <label>API 서버</label>
  <input type="text" id="serverUrl" value="http://localhost:8001" placeholder="http://localhost:8001">
  <button onclick="checkServer()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;">연결 확인</button>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-tab="diet">🍱 식단</button>
  <button class="tab" data-tab="prescription">💊 처방전</button>
  <button class="tab" data-tab="checkup">📋 건강검진표</button>
</div>

<div class="main">

<!-- 식단 탭 -->
<div class="tab-panel active" id="tab-diet">
  <div class="info-chip">📸 음식 사진을 찍거나 갤러리에서 선택하세요</div>
  <div class="upload-zone" id="zone-diet">
    <img class="preview-img" id="prev-diet">
    <div class="preview-overlay" id="overlay-diet"><span>📷</span><span>사진 변경</span></div>
    <div class="upload-icon" id="icon-diet">🍽️</div>
    <div class="upload-label" id="label-diet">식단 사진 업로드</div>
    <div class="upload-sub" id="sub-diet">카메라로 찍거나<br>갤러리에서 선택하세요</div>
    <input type="file" id="file-diet" accept="image/*" style="display:none">
  </div>
  <div class="btn-group">
    <button class="btn btn-camera" onclick="openCamera('diet')">📷 카메라</button>
    <button class="btn btn-gallery" onclick="openGallery('diet')">🖼️ 갤러리</button>
    <button class="btn btn-analyze" id="btn-diet" disabled onclick="analyze('diet')">✨ AI 분석 시작</button>
  </div>
  <div class="result-section" id="result-diet"></div>
</div>

<!-- 처방전 탭 -->
<div class="tab-panel" id="tab-prescription">
  <div class="info-chip">📷 약 봉투 또는 처방전을 정면으로 찍어주세요</div>
  <div class="upload-zone" id="zone-prescription">
    <img class="preview-img" id="prev-prescription">
    <div class="preview-overlay" id="overlay-prescription"><span>📷</span><span>사진 변경</span></div>
    <div class="upload-icon" id="icon-prescription">💊</div>
    <div class="upload-label" id="label-prescription">처방전 / 약봉투 촬영</div>
    <div class="upload-sub" id="sub-prescription">글자가 잘 보이도록<br>밝은 곳에서 찍어주세요</div>
    <input type="file" id="file-prescription" accept="image/*" style="display:none">
  </div>
  <div class="btn-group">
    <button class="btn btn-camera" onclick="openCamera('prescription')">📷 카메라</button>
    <button class="btn btn-gallery" onclick="openGallery('prescription')">🖼️ 갤러리</button>
    <button class="btn btn-analyze" id="btn-prescription" disabled onclick="analyze('prescription')">✨ AI 분석 시작</button>
  </div>
  <div class="result-section" id="result-prescription"></div>
</div>

<!-- 건강검진표 탭 -->
<div class="tab-panel" id="tab-checkup">
  <div class="info-chip">📋 건강검진 결과지 전체가 보이도록 찍어주세요</div>
  <div class="upload-zone" id="zone-checkup">
    <img class="preview-img" id="prev-checkup">
    <div class="preview-overlay" id="overlay-checkup"><span>📷</span><span>사진 변경</span></div>
    <div class="upload-icon" id="icon-checkup">📋</div>
    <div class="upload-label" id="label-checkup">건강검진 결과지 촬영</div>
    <div class="upload-sub" id="sub-checkup">수치가 선명하게 보이도록<br>평평하게 놓고 찍어주세요</div>
    <input type="file" id="file-checkup" accept="image/*" style="display:none">
  </div>
  <div class="btn-group">
    <button class="btn btn-camera" onclick="openCamera('checkup')">📷 카메라</button>
    <button class="btn btn-gallery" onclick="openGallery('checkup')">🖼️ 갤러리</button>
    <button class="btn btn-analyze" id="btn-checkup" disabled onclick="analyze('checkup')">✨ AI 분석 시작</button>
  </div>
  <div class="result-section" id="result-checkup"></div>
</div>

</div>

<script>
const state = { diet: null, prescription: null, checkup: null };

// ── 서버 URL ──
function getServer() {
  return document.getElementById('serverUrl').value.replace(/\/$/, '');
}

async function checkServer() {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot';
  try {
    const res = await fetch(getServer() + '/health', { signal: AbortSignal.timeout(3000) });
    dot.className = res.ok ? 'status-dot ok' : 'status-dot err';
  } catch {
    dot.className = 'status-dot err';
  }
}

// 페이지 로드 시 서버 확인
window.addEventListener('load', () => { setTimeout(checkServer, 500); });

// ── 탭 ──
document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
});

// ── 카메라 / 갤러리 ──
function openCamera(t) {
  const inp = document.getElementById('file-' + t);
  inp.setAttribute('capture', 'environment');
  inp.click();
}
function openGallery(t) {
  const inp = document.getElementById('file-' + t);
  inp.removeAttribute('capture');
  inp.click();
}

// ── 파일 이벤트 ──
['diet', 'prescription', 'checkup'].forEach(t => {
  const zone = document.getElementById('zone-' + t);
  const inp  = document.getElementById('file-' + t);

  zone.addEventListener('click', e => { if (e.target !== inp) openGallery(t); });
  inp.addEventListener('change', e => {
    const f = e.target.files[0];
    if (f) { handleFile(t, f); inp.value = ''; }
  });

  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if (f?.type.startsWith('image/')) handleFile(t, f);
  });
});

function handleFile(t, file) {
  state[t] = file;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('prev-' + t).src = ev.target.result;
    document.getElementById('prev-' + t).style.display = 'block';
    document.getElementById('overlay-' + t).style.display = 'flex';
    ['icon-','label-','sub-'].forEach(p => {
      document.getElementById(p + t).style.display = 'none';
    });
    document.getElementById('btn-' + t).disabled = false;
    const r = document.getElementById('result-' + t);
    r.classList.remove('visible'); r.innerHTML = '';
  };
  reader.readAsDataURL(file);
}

// ── 분석 (백엔드 FastAPI 호출) ──
async function analyze(t) {
  const btn = document.getElementById('btn-' + t);
  const resultEl = document.getElementById('result-' + t);
  if (!state[t]) return;

  btn.disabled = true;
  resultEl.innerHTML = loadingHTML();
  resultEl.classList.add('visible');

  const formData = new FormData();
  formData.append('file', state[t]);

  const endpointMap = { diet: '/api/v1/cv/diet', prescription: '/api/v1/cv/prescription', checkup: '/api/v1/cv/checkup' };

  try {
    const res = await fetch(getServer() + endpointMap[t], {
      method: 'POST',
      body: formData,
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.detail?.error_detail || `서버 오류 (${res.status})`);
    }

    if (t === 'diet') renderDiet(data, resultEl);
    else if (t === 'prescription') renderPrescription(data, resultEl);
    else renderCheckup(data, resultEl);

  } catch(err) {
    resultEl.innerHTML = errorHTML(err.message);
  } finally {
    btn.disabled = false;
  }
}

// ── 렌더러 ──
function renderDiet(data, el) {
  const ok = data.analysis_status === 'success';

  let foodsHTML = (data.foods || []).map(f => {
    const conf = Math.round((f.confidence ?? 0) * 100);
    const cls  = conf >= 80 ? '' : conf >= 60 ? 'medium' : 'low';
    const n    = f.nutrition || {};

    // 영양성분 표시
    const nutritionHTML = f.nutrition ? `
    <div style="margin-top:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;">
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">
        📊 영양성분 추정
        ${f.estimated_amount ? `<span style="margin-left:6px;color:var(--accent);">(${f.estimated_amount} 기준)</span>` : ''}
        <span style="margin-left:6px;color:var(--accent3);">※ 추정값 · 식약처 DB 매칭 전</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
        ${n.칼로리   != null ? `<div style="font-size:12px;">🔥 칼로리 <b>${n.칼로리}kcal</b></div>` : ''}
        ${n.탄수화물 != null ? `<div style="font-size:12px;">🍚 탄수화물 <b>${n.탄수화물}g</b></div>` : ''}
        ${n.당류     != null ? `<div style="font-size:12px;">🍬 당류 <b>${n.당류}g</b></div>` : ''}
        ${n.단백질   != null ? `<div style="font-size:12px;">🥩 단백질 <b>${n.단백질}g</b></div>` : ''}
        ${n.지방     != null ? `<div style="font-size:12px;">🧈 지방 <b>${n.지방}g</b></div>` : ''}
        ${n.포화지방 != null ? `<div style="font-size:12px;">⚠️ 포화지방 <b>${n.포화지방}g</b></div>` : ''}
        ${n.식이섬유 != null ? `<div style="font-size:12px;">🥦 식이섬유 <b>${n.식이섬유}g</b></div>` : ''}
        ${n.나트륨   != null ? `<div style="font-size:12px;">🧂 나트륨 <b>${n.나트륨}mg</b></div>` : ''}
      </div>
      ${n.영양성분_신뢰도 != null ? `
      <div style="margin-top:8px;font-size:11px;color:var(--text-muted);">
        영양성분 신뢰도
        <div style="display:flex;align-items:center;gap:6px;margin-top:3px;">
          <div style="flex:1;height:3px;background:var(--border);border-radius:2px;">
            <div style="width:${Math.round(n.영양성분_신뢰도*100)}%;height:100%;background:#e3b341;border-radius:2px;"></div>
          </div>
          <span>${Math.round(n.영양성분_신뢰도*100)}%</span>
        </div>
      </div>` : ''}
    </div>` : '';

    // 용량 입력창 (추정 불가 시)
    const amountHTML = f.amount_requires_input ? `
    <div style="margin-top:8px;display:flex;align-items:center;gap:8px;">
      <span style="font-size:12px;color:var(--text-muted);">용량 직접 입력</span>
      <input type="number" placeholder="g" min="0"
        style="width:80px;background:var(--surface2);border:1px solid var(--border);
               border-radius:6px;padding:4px 8px;color:var(--text);font-size:12px;"
        oninput="this.dataset.value=this.value">
      <span style="font-size:12px;color:var(--text-muted);">g</span>
    </div>` : `
    <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">
      📦 ${f.estimated_amount || '용량 정보 없음'}
    </div>`;

    return `<div class="food-item" style="flex-direction:column;align-items:flex-start;gap:8px;">
      <div style="display:flex;align-items:center;gap:12px;width:100%;">
        <div class="food-emoji">${catEmoji(f.nutrient_category)}</div>
        <div class="food-info" style="flex:1;">
          <div class="food-name">${f.name}${f.cooking_method ? ` <span style="font-size:11px;color:var(--text-muted);">(${f.cooking_method})</span>` : ''}</div>
          <div class="food-cat">${f.nutrient_category || ''}</div>
          <div class="confidence-bar">
            <div class="bar-track"><div class="bar-fill ${cls}" style="width:${conf}%"></div></div>
            <div class="conf-num">${conf}%</div>
          </div>
        </div>
      </div>
      ${amountHTML}
      ${nutritionHTML}
    </div>`;
  }).join('') || '<div style="color:var(--text-muted);font-size:13px">음식을 감지하지 못했습니다</div>';

  el.innerHTML = `
  <div class="result-header">
    <h3>식단 분석 결과</h3>
    <span class="badge badge-${ok?'success':'warn'}">${ok?'분석 완료':'확인 필요'}</span>
  </div>
  <div class="result-card">
    <div class="result-card-title">인식된 음식 (${(data.foods||[]).length}개)</div>
    ${foodsHTML}
  </div>
  ${data.requires_user_confirmation ? '<div class="confirm-banner">⚠️ 인식 결과를 확인하고 수정 후 저장하세요. 자동 저장되지 않습니다.</div>' : ''}
  ${jsonToggle(data)}
  <button class="btn-save" onclick="alert('→ POST /api/v1/diet/records/ 연동 예정')">💾 식단 기록 저장 (DIET)</button>`;
  el.classList.add('visible');
}

function renderCheckup(data, el) {
  const d = data.extracted_data || {};
  const fields = [
    {k:'systolic_bp',      l:'수축기 혈압',  u:'mmHg'},
    {k:'diastolic_bp',     l:'이완기 혈압',  u:'mmHg'},
    {k:'fasting_glucose',  l:'공복혈당',      u:'mg/dL'},
    {k:'hba1c',            l:'당화혈색소',    u:'%'},
    {k:'total_cholesterol',l:'총콜레스테롤', u:'mg/dL'},
    {k:'triglyceride',     l:'중성지방',      u:'mg/dL'},
    {k:'hdl',              l:'HDL',           u:'mg/dL'},
    {k:'ldl',              l:'LDL',           u:'mg/dL'},
    {k:'weight_kg',        l:'체중',           u:'kg'},
    {k:'bmi',              l:'BMI',            u:''},
    {k:'waist_cm',         l:'허리둘레',       u:'cm'},
  ];
  const extracted = fields.filter(f => d[f.k] !== null && d[f.k] !== undefined);
  const gridHTML = extracted.map(f => `
  <div class="metric-item">
    <div class="metric-label">${f.l}</div>
    <div class="metric-value">${d[f.k]}<span class="metric-unit">${f.u}</span></div>
  </div>`).join('') || '<div style="color:var(--text-muted);font-size:13px">수치를 추출하지 못했습니다</div>';

  el.innerHTML = `
  <div class="result-header">
    <h3>건강검진 수치 추출</h3>
    <span class="badge badge-success">${extracted.length}개 항목</span>
  </div>
  <div class="result-card">
    <div class="result-card-title">4대 만성질환 관련 수치</div>
    ${extracted.length ? `<div class="metric-grid">${gridHTML}</div>` : gridHTML}
  </div>
  <div class="confirm-banner info-banner">ℹ️ 수치만 추출합니다. 정상/비정상 판정은 제공하지 않습니다.</div>
  ${(data.unreadable_fields||[]).length ? `<div class="confirm-banner">⚠️ 인식 불가: ${data.unreadable_fields.join(', ')}</div>` : ''}
  ${jsonToggle(data)}
  <button class="btn-save" onclick="alert('→ POST /api/v1/health/records/ 연동 예정')">💾 건강정보 저장 (HEALTH)</button>`;
  el.classList.add('visible');
}

// ── 유틸 ──
function catEmoji(c) {
  return {
    '탄수화물':'🍚', '단백질':'🥩', '지방':'🧈',
    '식이섬유':'🥦', '비타민':'🥕', '미네랄':'🌿',
    '항산화':'🍅', '건강식':'🥑'
  }[c] || '🍽️';
}
function selectPill(el) {
  el.closest('.dosage-pills').querySelectorAll('.pill').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
}
function jsonToggle(d) {
  return `<div class="json-toggle">
    <div class="json-toggle-header" onclick="this.nextElementSibling.classList.toggle('open')">
      <span>🔧 원본 응답 (개발용)</span><span>▾</span>
    </div>
    <div class="json-body"><pre>${JSON.stringify(d, null, 2)}</pre></div>
  </div>`;
}
function loadingHTML() {
  return `<div class="loading-box"><div class="spinner"></div><div class="loading-text">GPT Vision 분석 중<span class="loading-dots"></span></div><div style="font-size:11px;color:var(--text-dim)">gpt-4o-mini · FastAPI 백엔드</div></div>`;
}
function errorHTML(msg) {
  return `<div class="result-card" style="border-color:rgba(247,129,102,0.4)">
    <div style="color:var(--accent3);font-size:14px;font-weight:600;margin-bottom:8px">❌ 분석 실패</div>
    <div style="font-size:13px;color:var(--text-muted)">${msg}</div>
    <div style="font-size:11px;color:var(--text-dim);margin-top:8px">서버 연결 상태를 확인하거나 이미지를 다시 촬영해보세요.</div>
  </div>`;
}
</script>
</body>
</html>
