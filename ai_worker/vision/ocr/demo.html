<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>건강검진표 OCR</title>
<style>
:root {
  --bg:#0d1117; --surface:#161b22; --surface2:#1c2333; --border:#30363d;
  --accent:#3fb950; --accent2:#58a6ff; --accent3:#f78166; --warn:#e3b341;
  --text:#e6edf3; --text-muted:#7d8590; --text-dim:#484f58;
  --radius:12px; --radius-sm:8px;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.header { position:sticky; top:0; z-index:100; background:rgba(13,17,23,0.9); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; gap:10px; }
.logo { width:32px; height:32px; background:linear-gradient(135deg,#3fb950,#58a6ff); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; }
.title { font-size:16px; font-weight:600; }
.sub { font-size:11px; color:var(--text-muted); margin-top:1px; }
.badge { margin-left:auto; font-size:10px; font-weight:600; padding:3px 8px; border-radius:20px; background:rgba(63,185,80,0.12); color:var(--accent); border:1px solid rgba(63,185,80,0.25); }
.server-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:10px 20px; display:flex; align-items:center; gap:8px; }
.server-bar label { font-size:11px; color:var(--text-muted); white-space:nowrap; }
.server-bar input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:6px 10px; font-size:12px; color:var(--text); outline:none; }
.server-bar input:focus { border-color:var(--accent2); }
.dot { width:8px; height:8px; border-radius:50%; background:var(--text-dim); flex-shrink:0; }
.dot.ok { background:var(--accent); }
.dot.err { background:var(--accent3); }
.tabs { display:flex; gap:8px; padding:16px 20px 0; }
.tab { flex:1; padding:10px; border-radius:var(--radius-sm); font-size:13px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--text-muted); text-align:center; }
.tab.active { background:var(--accent); border-color:var(--accent); color:#0d1117; }
.main { padding:20px; max-width:520px; margin:0 auto; }
.chip { display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--text-muted); background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:4px 10px; margin-bottom:14px; }
.zone { position:relative; border:2px dashed var(--border); border-radius:var(--radius); background:var(--surface); min-height:200px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; cursor:pointer; overflow:hidden; }
.zone:hover { border-color:var(--accent); background:rgba(63,185,80,0.04); }
.zone img { display:none; width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
.zone-overlay { display:none; position:absolute; inset:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.zone-overlay span { font-size:13px; color:#fff; }
.zone-icon { width:56px; height:56px; background:var(--surface2); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:26px; border:1px solid var(--border); }
.zone-label { font-size:15px; font-weight:600; }
.zone-sub { font-size:12px; color:var(--text-muted); text-align:center; line-height:1.6; }
.pdf-info { display:none; flex-direction:column; align-items:center; gap:8px; padding:20px; }
.pdf-info .pdf-icon { font-size:48px; }
.pdf-name { font-size:13px; color:var(--text-muted); text-align:center; word-break:break-all; }
.pdf-size { font-size:11px; color:var(--text-dim); }
.btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
.btns.single { grid-template-columns:1fr; }
.btn { display:flex; align-items:center; justify-content:center; gap:7px; padding:13px 16px; border-radius:var(--radius-sm); font-size:14px; font-weight:600; cursor:pointer; border:none; }
.btn-gray { background:var(--surface2); border:1px solid var(--border); color:var(--text); }
.btn-green { grid-column:1/-1; background:var(--accent); color:#0d1117; font-size:15px; padding:15px; }
.btn-green:disabled { background:var(--surface2); color:var(--text-dim); cursor:not-allowed; }
.result { margin-top:24px; display:none; }
.result.show { display:block; }
.result-header { display:flex; align-items:center; gap:8px; margin-bottom:16px; }
.result-header h3 { font-size:15px; font-weight:600; }
.rbadge { padding:3px 8px; border-radius:20px; font-size:11px; font-weight:600; }
.rbadge.success { background:rgba(63,185,80,0.15); color:var(--accent); }
.rbadge.partial { background:rgba(227,179,65,0.15); color:var(--warn); }
.rbadge.failed { background:rgba(247,129,102,0.15); color:var(--accent3); }
.qbanner { border-radius:var(--radius-sm); padding:14px; margin-bottom:12px; }
.qbanner.good { background:rgba(63,185,80,0.08); border:1px solid rgba(63,185,80,0.3); }
.qbanner.warn { background:rgba(227,179,65,0.08); border:1px solid rgba(227,179,65,0.3); }
.qbanner.bad { background:rgba(247,129,102,0.08); border:1px solid rgba(247,129,102,0.3); }
.qtitle { font-size:13px; font-weight:600; margin-bottom:8px; }
.qbanner.good .qtitle { color:var(--accent); }
.qbanner.warn .qtitle { color:var(--warn); }
.qbanner.bad .qtitle { color:var(--accent3); }
.qguide { list-style:none; }
.qguide li { font-size:12px; color:var(--text-muted); padding:3px 0 3px 14px; position:relative; }
.qguide li::before { content:'·'; position:absolute; left:4px; }
.dgroup { margin-bottom:20px; }
.dtitle { font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid var(--border); }
.fgrid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.fitem { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px; }
.fitem.warn { border-color:var(--warn); background:rgba(227,179,65,0.05); }
.fitem.miss { border-color:rgba(247,129,102,0.4); background:rgba(247,129,102,0.05); }
.flabel { font-size:11px; color:var(--text-muted); margin-bottom:6px; }
.finput { width:100%; background:transparent; border:none; border-bottom:1px solid var(--border); color:var(--text); font-size:16px; font-weight:600; padding:4px 0; outline:none; }
.finput:focus { border-bottom-color:var(--accent2); }
.finput.warn-val { color:var(--warn); }
.finput.miss-val { color:var(--accent3); }
.finput::placeholder { color:var(--text-dim); font-size:13px; font-weight:400; }
.funit { font-size:10px; color:var(--text-dim); margin-top:3px; }
.fstatus { font-size:10px; margin-top:3px; }
.fstatus.ok { color:var(--accent); }
.fstatus.warn { color:var(--warn); }
.fstatus.miss { color:var(--accent3); }
.legend { display:flex; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
.legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text-muted); }
.ldot { width:8px; height:8px; border-radius:2px; }
.ldot.ok { background:var(--surface2); border:1px solid var(--border); }
.ldot.warn { background:rgba(227,179,65,0.3); border:1px solid var(--warn); }
.ldot.miss { background:rgba(247,129,102,0.2); border:1px solid rgba(247,129,102,0.4); }
.save-btn { width:100%; margin-top:20px; background:var(--surface2); border:1px solid var(--accent2); color:var(--accent2); padding:14px; border-radius:var(--radius-sm); font-size:14px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px; }
.save-btn:hover { background:rgba(88,166,255,0.1); }
.json-box { margin-top:14px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.json-head { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; cursor:pointer; font-size:13px; color:var(--text-muted); }
.json-head:hover { background:var(--surface2); }
.json-body { display:none; padding:14px 16px; border-top:1px solid var(--border); }
.json-body.open { display:block; }
pre { font-size:11px; line-height:1.7; color:var(--accent2); white-space:pre-wrap; word-break:break-all; }
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:32px 20px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); }
.spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-size:14px; color:var(--text-muted); }
.err-card { background:var(--surface); border:1px solid rgba(247,129,102,0.4); border-radius:var(--radius); padding:16px; }
.err-title { color:var(--accent3); font-size:14px; font-weight:600; margin-bottom:8px; }
.err-msg { font-size:13px; color:var(--text-muted); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">📋</div>
  <div>
    <div class="title">건강검진표 OCR</div>
    <div class="sub">PaddleOCR · 이미지 &amp; PDF 지원</div>
  </div>
  <div class="badge">DEMO</div>
</div>

<div class="server-bar">
  <div class="dot" id="dot"></div>
  <label>API 서버</label>
  <input type="text" id="serverUrl" value="http://localhost:8001">
  <button onclick="checkServer()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;">연결 확인</button>
</div>

<div class="tabs">
  <button class="tab active" id="tab-image" onclick="switchTab('image')">🖼️ 이미지</button>
  <button class="tab" id="tab-pdf" onclick="switchTab('pdf')">📄 PDF</button>
</div>

<div class="main">

  <div id="mode-image">
    <div class="chip">📋 건강검진 결과지를 찍거나 갤러리에서 선택하세요</div>
    <div class="zone" id="zone-image">
      <img id="prev-image" alt="미리보기">
      <div class="zone-overlay" id="overlay-image"><span>📷</span><span>사진 변경</span></div>
      <div class="zone-icon" id="icon-image">📋</div>
      <div class="zone-label" id="label-image">건강검진표 이미지 업로드</div>
      <div class="zone-sub" id="sub-image">수치가 선명하게 보이도록<br>평평하게 놓고 찍어주세요</div>
      <input type="file" id="file-image" accept="image/*" style="display:none">
    </div>
    <div class="btns">
      <button class="btn btn-gray" onclick="openCamera()">📷 카메라</button>
      <button class="btn btn-gray" onclick="openGallery()">🖼️ 갤러리</button>
      <button class="btn btn-green" id="btn-image" disabled onclick="analyze('image')">✨ OCR 분석 시작</button>
    </div>
  </div>

  <div id="mode-pdf" style="display:none">
    <div class="chip">📄 건강검진표 PDF를 업로드하세요 (최대 20MB)</div>
    <div class="zone" id="zone-pdf">
      <div class="pdf-info" id="pdf-info">
        <div class="pdf-icon">📄</div>
        <div class="pdf-name" id="pdf-name"></div>
        <div class="pdf-size" id="pdf-size"></div>
      </div>
      <div class="zone-icon" id="icon-pdf">📄</div>
      <div class="zone-label" id="label-pdf">PDF 파일 업로드</div>
      <div class="zone-sub" id="sub-pdf">클릭하거나 PDF를 드래그해서 올려주세요<br>텍스트/스캔 PDF 모두 지원</div>
      <input type="file" id="file-pdf" accept="application/pdf" style="display:none">
    </div>
    <div class="btns single">
      <button class="btn btn-green" id="btn-pdf" disabled onclick="analyze('pdf')">✨ OCR 분석 시작</button>
    </div>
  </div>

  <div class="result" id="result"></div>
</div>

<script>
var FIELDS = {
  '고혈압': [
    { key:'systolic_bp',  label:'수축기 혈압', unit:'mmHg' },
    { key:'diastolic_bp', label:'이완기 혈압', unit:'mmHg' }
  ],
  '당뇨': [
    { key:'fasting_glucose', label:'공복혈당',   unit:'mg/dL' },
    { key:'hba1c',           label:'당화혈색소', unit:'%' }
  ],
  '이상지질혈증': [
    { key:'total_cholesterol', label:'총콜레스테롤', unit:'mg/dL' },
    { key:'triglyceride',      label:'중성지방',     unit:'mg/dL' },
    { key:'hdl',               label:'HDL',          unit:'mg/dL' },
    { key:'ldl',               label:'LDL',          unit:'mg/dL' }
  ],
  '비만': [
    { key:'height_cm', label:'키',       unit:'cm' },
    { key:'weight_kg', label:'체중',     unit:'kg' },
    { key:'bmi',       label:'BMI',      unit:'' },
    { key:'waist_cm',  label:'허리둘레', unit:'cm' }
  ]
};

var currentFile = { image: null, pdf: null };

function switchTab(mode) {
  document.getElementById('mode-image').style.display = mode === 'image' ? 'block' : 'none';
  document.getElementById('mode-pdf').style.display   = mode === 'pdf'   ? 'block' : 'none';
  document.getElementById('tab-image').className = 'tab' + (mode === 'image' ? ' active' : '');
  document.getElementById('tab-pdf').className   = 'tab' + (mode === 'pdf'   ? ' active' : '');
  document.getElementById('result').className = 'result';
  document.getElementById('result').innerHTML = '';
}

function getServer() {
  return document.getElementById('serverUrl').value.replace(/\/$/, '');
}

function checkServer() {
  var dot = document.getElementById('dot');
  dot.className = 'dot';
  fetch(getServer() + '/health', { signal: AbortSignal.timeout(3000) })
    .then(function(res) { dot.className = res.ok ? 'dot ok' : 'dot err'; })
    .catch(function() { dot.className = 'dot err'; });
}

window.onload = function() { setTimeout(checkServer, 500); };

function openCamera() {
  var inp = document.getElementById('file-image');
  inp.setAttribute('capture', 'environment');
  inp.click();
}

function openGallery() {
  var inp = document.getElementById('file-image');
  inp.removeAttribute('capture');
  inp.click();
}

document.getElementById('zone-image').addEventListener('click', function(e) {
  if (e.target !== document.getElementById('file-image')) {
    openGallery();
  }
});

document.getElementById('zone-pdf').addEventListener('click', function(e) {
  if (e.target !== document.getElementById('file-pdf')) {
    document.getElementById('file-pdf').click();
  }
});

document.getElementById('file-image').addEventListener('change', function(e) {
  var f = e.target.files[0];
  if (f) { currentFile.image = f; showPreview('image', f); e.target.value = ''; }
});

document.getElementById('file-pdf').addEventListener('change', function(e) {
  var f = e.target.files[0];
  if (f) { currentFile.pdf = f; showPreview('pdf', f); e.target.value = ''; }
});

function addDrop(mode) {
  var zone = document.getElementById('zone-' + mode);
  zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.style.borderColor = 'var(--accent)'; });
  zone.addEventListener('dragleave', function() { zone.style.borderColor = ''; });
  zone.addEventListener('drop', function(e) {
    e.preventDefault(); zone.style.borderColor = '';
    var f = e.dataTransfer.files[0];
    if (f) { currentFile[mode] = f; showPreview(mode, f); }
  });
}
addDrop('image');
addDrop('pdf');

function showPreview(mode, file) {
  if (mode === 'image') {
    var reader = new FileReader();
    reader.onload = function(ev) {
      var img = document.getElementById('prev-image');
      img.src = ev.target.result;
      img.style.display = 'block';
      document.getElementById('overlay-image').style.display = 'flex';
      document.getElementById('icon-image').style.display  = 'none';
      document.getElementById('label-image').style.display = 'none';
      document.getElementById('sub-image').style.display   = 'none';
    };
    reader.readAsDataURL(file);
  } else {
    document.getElementById('pdf-info').style.display  = 'flex';
    document.getElementById('pdf-name').textContent    = file.name;
    document.getElementById('pdf-size').textContent    = (file.size / 1024 / 1024).toFixed(1) + 'MB';
    document.getElementById('icon-pdf').style.display  = 'none';
    document.getElementById('label-pdf').style.display = 'none';
    document.getElementById('sub-pdf').style.display   = 'none';
  }
  document.getElementById('btn-' + mode).disabled = false;
  document.getElementById('result').className = 'result';
  document.getElementById('result').innerHTML = '';
}

function analyze(mode) {
  var file = currentFile[mode];
  if (!file) return;

  var btn    = document.getElementById('btn-' + mode);
  var result = document.getElementById('result');
  btn.disabled = true;

  var label = mode === 'pdf' ? 'PDF 변환 후 OCR 분석 중' : 'OCR 분석 중';
  result.innerHTML = '<div class="loading"><div class="spinner"></div>'
    + '<div class="loading-text">' + label + '...</div>'
    + '<div style="font-size:11px;color:var(--text-dim)">PaddleOCR · 건강검진표 수치 추출</div></div>';
  result.className = 'result show';

  var endpoint = mode === 'image' ? '/api/v1/ocr/checkup' : '/api/v1/ocr/checkup/pdf';
  var fd = new FormData();
  fd.append('file', file);

  fetch(getServer() + endpoint, { method:'POST', body:fd })
    .then(function(res) {
      return res.json().then(function(data) { return { ok:res.ok, data:data }; });
    })
    .then(function(r) {
      if (!r.ok) renderError(r.data.detail, result);
      else renderResult(r.data, result);
    })
    .catch(function() {
      renderError({ message:'서버에 연결할 수 없습니다.' }, result);
    })
    .finally(function() { btn.disabled = false; });
}

function renderResult(data, el) {
  var extracted = data.extracted_data || {};
  var lowConf   = data.low_confidence_fields || [];
  var status    = data.ocr_status;
  var quality   = data.quality_report;

  var html = '<div class="result-header">'
    + '<h3>추출 결과</h3>'
    + '<span class="rbadge ' + status + '">' + statusLabel(status) + '</span>'
    + '</div>'
    + qBanner(quality)
    + '<p style="font-size:12px;color:var(--text-muted);margin:0 0 12px">' + data.message + '</p>'
    + '<div class="legend">'
    + '<div class="legend-item"><div class="ldot ok"></div>OCR 인식</div>'
    + '<div class="legend-item"><div class="ldot warn"></div>확인 필요</div>'
    + '<div class="legend-item"><div class="ldot miss"></div>직접 입력</div>'
    + '</div>';

  var diseases = Object.keys(FIELDS);
  for (var d = 0; d < diseases.length; d++) {
    var disease = diseases[d];
    var fields  = FIELDS[disease];
    html += '<div class="dgroup"><div class="dtitle">' + diseaseEmoji(disease) + ' ' + disease + '</div><div class="fgrid">';
    for (var f = 0; f < fields.length; f++) {
      var field   = fields[f];
      var value   = extracted[field.key];
      var isLow   = lowConf.indexOf(field.key) !== -1;
      var missing = (value === null || value === undefined);
      var ic, fc, st, va;
      if (missing) {
        ic = 'fitem miss'; fc = 'finput miss-val';
        st = '<div class="fstatus miss">직접 입력 필요</div>';
        va = 'placeholder="직접 입력"';
      } else if (isLow) {
        ic = 'fitem warn'; fc = 'finput warn-val';
        st = '<div class="fstatus warn">확인 후 수정</div>';
        va = 'value="' + value + '"';
      } else {
        ic = 'fitem'; fc = 'finput';
        st = '<div class="fstatus ok">OCR 인식</div>';
        va = 'value="' + value + '"';
      }
      html += '<div class="' + ic + '">'
        + '<div class="flabel">' + field.label + '</div>'
        + '<input ' + va + ' class="' + fc + '" type="number" step="0.1" id="f-' + field.key + '">'
        + '<div class="funit">' + field.unit + '</div>'
        + st + '</div>';
    }
    html += '</div></div>';
  }

  html += '<div class="json-box">'
    + '<div class="json-head" onclick="this.nextElementSibling.classList.toggle(\'open\')">'
    + '<span>🔧 원본 응답 (개발용)</span><span>▾</span></div>'
    + '<div class="json-body"><pre>' + JSON.stringify(data, null, 2) + '</pre></div></div>'
    + '<button class="save-btn" onclick="saveResult()">💾 건강정보 저장 (HEALTH 연동 예정)</button>';

  el.innerHTML = html;
  el.className = 'result show';
}

function qBanner(quality) {
  if (!quality) return '';
  var clsMap = { good:'good', small:'bad' };
  var cls = clsMap[quality.status] || 'warn';
  var g = '';
  if (quality.guide && quality.guide.length) {
    g = '<ul class="qguide">';
    for (var i = 0; i < quality.guide.length; i++) g += '<li>' + quality.guide[i] + '</li>';
    g += '</ul>';
  }
  return '<div class="qbanner ' + cls + '"><div class="qtitle">📸 ' + quality.message + '</div>' + g + '</div>';
}

function renderError(detail, el) {
  var msg = detail && detail.message ? detail.message : '알 수 없는 오류가 발생했습니다.';
  el.innerHTML = '<div class="err-card"><div class="err-title">❌ 분석 실패</div><div class="err-msg">' + msg + '</div></div>';
  el.className = 'result show';
}

function saveResult() {
  var result = {};
  var diseases = Object.keys(FIELDS);
  for (var d = 0; d < diseases.length; d++) {
    var fields = FIELDS[diseases[d]];
    for (var f = 0; f < fields.length; f++) {
      var el = document.getElementById('f-' + fields[f].key);
      result[fields[f].key] = el && el.value ? parseFloat(el.value) : null;
    }
  }
  alert('저장 데이터:\n' + JSON.stringify(result, null, 2));
}

function statusLabel(s) {
  return { success:'추출 완료', partial:'부분 인식', failed:'인식 실패' }[s] || s;
}

function diseaseEmoji(d) {
  return { '고혈압':'🫀', '당뇨':'🩸', '이상지질혈증':'🧪', '비만':'⚖️' }[d] || '📊';
}
</script>
</body>
