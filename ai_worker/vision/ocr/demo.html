<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>건강검진표 OCR · 데모</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap');
  :root {
    --bg:#0d1117; --surface:#161b22; --surface2:#1c2333; --border:#30363d;
    --accent:#3fb950; --accent2:#58a6ff; --accent3:#f78166;
    --text:#e6edf3; --text-muted:#7d8590; --text-dim:#484f58;
    --radius:12px; --radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  .header{position:sticky;top:0;z-index:100;background:rgba(13,17,23,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:10px;}
  .header-logo{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .header-title{font-size:16px;font-weight:600;}
  .header-sub{font-size:11px;color:var(--text-muted);margin-top:1px;}
  .api-badge{margin-left:auto;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;background:rgba(63,185,80,0.12);color:var(--accent);border:1px solid rgba(63,185,80,0.25);}
  .server-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:8px;}
  .server-bar label{font-size:11px;color:var(--text-muted);white-space:nowrap;}
  .server-bar input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;color:var(--text);outline:none;font-family:'Fira Code',monospace;}
  .server-bar input:focus{border-color:var(--accent2);}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--text-dim);flex-shrink:0;transition:background 0.3s;}
  .status-dot.ok{background:var(--accent);}
  .status-dot.err{background:var(--accent3);}
  .main{padding:20px;max-width:480px;margin:0 auto;}
  .type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
  .type-btn{padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text-muted);font-size:13px;font-weight:500;cursor:pointer;text-align:center;transition:all 0.2s;}
  .type-btn.active{border-color:var(--accent2);background:rgba(88,166,255,0.08);color:var(--accent2);font-weight:600;}
  .upload-zone{position:relative;border:2px dashed var(--border);border-radius:var(--radius);background:var(--surface);min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;transition:all 0.25s;overflow:hidden;}
  .upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:rgba(63,185,80,0.04);}
  .preview-img{display:none;width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:calc(var(--radius) - 2px);}
  .preview-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;border-radius:calc(var(--radius) - 2px);flex-direction:column;gap:8px;}
  .preview-overlay span{font-size:13px;color:#fff;}
  .upload-icon{width:56px;height:56px;background:var(--surface2);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;border:1px solid var(--border);}
  .upload-label{font-size:15px;font-weight:600;}
  .upload-sub{font-size:12px;color:var(--text-muted);text-align:center;line-height:1.6;}
  .pdf-preview{display:none;width:100%;padding:20px;flex-direction:column;align-items:center;gap:10px;}
  .pdf-preview.visible{display:flex;}
  .pdf-icon{font-size:40px;}
  .pdf-name{font-size:13px;font-weight:600;color:var(--accent2);text-align:center;word-break:break-all;}
  .pdf-size{font-size:11px;color:var(--text-muted);}
  .btn-group{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
  .btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:13px 16px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;position:relative;overflow:hidden;}
  .btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.08);opacity:0;transition:opacity 0.15s;}
  .btn:active::after{opacity:1;}
  .btn-camera,.btn-gallery{background:var(--surface2);border:1px solid var(--border);color:var(--text);}
  .btn-analyze{grid-column:1/-1;background:var(--accent);color:#0d1117;font-size:15px;padding:15px;}
  .btn-analyze:disabled{background:var(--surface2);color:var(--text-dim);cursor:not-allowed;}
  .btn-analyze:disabled::after{display:none;}
  .info-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;margin-bottom:14px;}
  .result-section{margin-top:24px;display:none;}
  .result-section.visible{display:block;}
  .result-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
  .result-header h3{font-size:15px;font-weight:600;}
  .badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;}
  .badge-success{background:rgba(63,185,80,0.15);color:var(--accent);}
  .badge-warn{background:rgba(247,129,102,0.15);color:var(--accent3);}
  .badge-info{background:rgba(88,166,255,0.15);color:var(--accent2);}
  .result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;}
  .result-card-title{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;}
  .metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .metric-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;}
  .metric-item.bmi-calc{border-color:rgba(88,166,255,0.4);}
  .metric-label{font-size:11px;color:var(--text-muted);margin-bottom:4px;}
  .metric-value{font-size:20px;font-weight:700;}
  .metric-unit{font-size:11px;color:var(--text-muted);margin-left:2px;}
  .metric-tag{display:inline-block;margin-top:4px;font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(88,166,255,0.12);color:var(--accent2);}
  .ocr-tag{display:inline-block;margin-top:4px;font-size:10px;color:var(--accent);}
  .quality-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
  .quality-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:12px;}
  .quality-row:last-child{margin-bottom:0;}
  .quality-key{color:var(--text-muted);}
  .quality-val{font-weight:600;}
  .loading-box{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:32px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
  .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-size:14px;color:var(--text-muted);}
  .loading-dots::after{content:'';animation:dots 1.5s steps(3,end) infinite;}
  @keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}
  .confirm-banner{display:flex;align-items:flex-start;gap:10px;background:rgba(247,129,102,0.08);border:1px solid rgba(247,129,102,0.3);border-radius:var(--radius-sm);padding:12px;margin-top:10px;font-size:12px;color:var(--accent3);line-height:1.5;}
  .info-banner{background:rgba(88,166,255,0.08);border-color:rgba(88,166,255,0.3);color:var(--accent2);}
  .json-toggle{margin-top:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .json-toggle-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-muted);}
  .json-toggle-header:hover{background:var(--surface2);}
  .json-body{display:none;padding:14px 16px;border-top:1px solid var(--border);}
  .json-body.open{display:block;}
  pre{font-size:11px;line-height:1.7;color:var(--accent2);white-space:pre-wrap;word-break:break-all;font-family:'Fira Code',monospace;}
  .btn-save{width:100%;margin-top:14px;background:var(--surface2);border:1px solid var(--accent2);color:var(--accent2);padding:13px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all 0.2s;}
  .btn-save:hover{background:rgba(88,166,255,0.1);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .main>*{animation:fadeUp 0.3s ease both;}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🏥</div>
  <div>
    <div class="header-title">건강검진표 OCR</div>
    <div class="header-sub">PaddleOCR · 이미지 + PDF 지원</div>
  </div>
  <div class="api-badge">DEMO</div>
</div>

<div class="server-bar">
  <div class="status-dot" id="statusDot"></div>
  <label>API 서버</label>
  <input type="text" id="serverUrl" value="http://localhost:8001" placeholder="http://localhost:8001">
  <button onclick="checkServer()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;">연결 확인</button>
</div>

<div class="main">
  <div class="info-chip">📋 건강검진 결과지를 업로드하세요</div>

  <div class="type-toggle">
    <button class="type-btn active" id="type-image" onclick="setType('image')">🖼️ 이미지 (JPG/PNG)</button>
    <button class="type-btn" id="type-pdf" onclick="setType('pdf')">📄 PDF</button>
  </div>

  <div class="upload-zone" id="upload-zone">
    <img class="preview-img" id="preview-img">
    <div class="preview-overlay" id="preview-overlay"><span>📷</span><span>파일 변경</span></div>
    <div class="pdf-preview" id="pdf-preview">
      <div class="pdf-icon">📄</div>
      <div class="pdf-name" id="pdf-name"></div>
      <div class="pdf-size" id="pdf-size"></div>
    </div>
    <div class="upload-icon" id="upload-icon">📋</div>
    <div class="upload-label" id="upload-label">건강검진 결과지 업로드</div>
    <div class="upload-sub" id="upload-sub">수치가 선명하게 보이도록<br>평평하게 놓고 찍어주세요</div>
    <input type="file" id="file-input" accept="image/*" style="display:none">
  </div>

  <div class="btn-group">
    <button class="btn btn-camera" id="btn-camera" onclick="openCamera()">📷 카메라</button>
    <button class="btn btn-gallery" onclick="openGallery()">🖼️ 갤러리 / 파일</button>
    <button class="btn btn-analyze" id="btn-analyze" disabled onclick="analyze()">✨ OCR 분석 시작</button>
  </div>

  <div class="result-section" id="result-section"></div>
</div>

<script>
let currentType = 'image';
let currentFile = null;

function getServer() {
  return document.getElementById('serverUrl').value.replace(/\/$/, '');
}

async function checkServer() {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot';
  try {
    const res = await fetch(getServer() + '/health', { signal: AbortSignal.timeout(3000) });
    dot.className = res.ok ? 'status-dot ok' : 'status-dot err';
  } catch { dot.className = 'status-dot err'; }
}
window.addEventListener('load', () => setTimeout(checkServer, 500));

function setType(type) {
  currentType = type;
  currentFile = null;
  document.getElementById('type-image').classList.toggle('active', type === 'image');
  document.getElementById('type-pdf').classList.toggle('active', type === 'pdf');
  const inp = document.getElementById('file-input');
  if (type === 'image') {
    inp.accept = 'image/*';
    document.getElementById('upload-icon').textContent = '📋';
    document.getElementById('upload-label').textContent = '건강검진 결과지 업로드';
    document.getElementById('upload-sub').textContent = '수치가 선명하게 보이도록 평평하게 놓고 찍어주세요';
    document.getElementById('btn-camera').style.display = '';
  } else {
    inp.accept = 'application/pdf';
    document.getElementById('upload-icon').textContent = '📄';
    document.getElementById('upload-label').textContent = 'PDF 파일 업로드';
    document.getElementById('upload-sub').textContent = '건강검진 결과 PDF를 선택해주세요';
    document.getElementById('btn-camera').style.display = 'none';
  }
  resetPreview();
  document.getElementById('btn-analyze').disabled = true;
  document.getElementById('result-section').classList.remove('visible');
  document.getElementById('result-section').innerHTML = '';
}

function resetPreview() {
  document.getElementById('preview-img').style.display = 'none';
  document.getElementById('preview-overlay').style.display = 'none';
  document.getElementById('pdf-preview').classList.remove('visible');
  document.getElementById('upload-icon').style.display = '';
  document.getElementById('upload-label').style.display = '';
  document.getElementById('upload-sub').style.display = '';
}

function openCamera() {
  const inp = document.getElementById('file-input');
  inp.setAttribute('capture', 'environment');
  inp.click();
}
function openGallery() {
  const inp = document.getElementById('file-input');
  inp.removeAttribute('capture');
  inp.click();
}

const zone = document.getElementById('upload-zone');
const inp  = document.getElementById('file-input');
zone.addEventListener('click', e => { if (e.target !== inp) openGallery(); });
inp.addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) { handleFile(f); inp.value = ''; }
});
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});

function handleFile(file) {
  currentFile = file;
  if (currentType === 'image') {
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById('preview-img').src = ev.target.result;
      document.getElementById('preview-img').style.display = 'block';
      document.getElementById('preview-overlay').style.display = 'flex';
      ['upload-icon','upload-label','upload-sub'].forEach(id => document.getElementById(id).style.display = 'none');
    };
    reader.readAsDataURL(file);
  } else {
    document.getElementById('pdf-name').textContent = file.name;
    document.getElementById('pdf-size').textContent = (file.size / 1024).toFixed(1) + ' KB';
    document.getElementById('pdf-preview').classList.add('visible');
    ['upload-icon','upload-label','upload-sub'].forEach(id => document.getElementById(id).style.display = 'none');
  }
  document.getElementById('btn-analyze').disabled = false;
  document.getElementById('result-section').classList.remove('visible');
  document.getElementById('result-section').innerHTML = '';
}

async function analyze() {
  if (!currentFile) return;
  const btn = document.getElementById('btn-analyze');
  const resultEl = document.getElementById('result-section');
  btn.disabled = true;
  resultEl.innerHTML = loadingHTML();
  resultEl.classList.add('visible');

  const endpoint = currentType === 'pdf' ? '/api/v1/ocr/checkup/pdf' : '/api/v1/ocr/checkup';
  const formData = new FormData();
  formData.append('file', currentFile);

  try {
    const res = await fetch(getServer() + endpoint, { method: 'POST', body: formData });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail?.message || `서버 오류 (${res.status})`);
    renderResult(data, resultEl);
  } catch(err) {
    resultEl.innerHTML = errorHTML(err.message);
  } finally {
    btn.disabled = false;
  }
}

function renderResult(data, el) {
  const d = data.extracted_data || {};
  const status = data.ocr_status || 'failed';
  const badgeCls = status === 'success' ? 'badge-success' : 'badge-warn';
  const fields = [
    {k:'systolic_bp',      l:'수축기 혈압',  u:'mmHg'},
    {k:'diastolic_bp',     l:'이완기 혈압',  u:'mmHg'},
    {k:'fasting_glucose',  l:'공복혈당',      u:'mg/dL'},
    {k:'hb',               l:'혈색소',        u:'g/dL'},
    {k:'total_cholesterol',l:'총콜레스테롤', u:'mg/dL'},
    {k:'triglyceride',     l:'중성지방',      u:'mg/dL'},
    {k:'hdl',              l:'HDL',           u:'mg/dL'},
    {k:'ldl',              l:'LDL',           u:'mg/dL'},
    {k:'height_cm',        l:'키',             u:'cm'},
    {k:'weight_kg',        l:'체중',           u:'kg'},
    {k:'bmi',              l:'BMI',            u:''},
    {k:'waist_cm',         l:'허리둘레',       u:'cm'},
  ];
  const extracted = fields.filter(f => d[f.k] !== null && d[f.k] !== undefined);
  const gridHTML = extracted.map(f => {
    const isBmiCalc = f.k === 'bmi' && d.bmi_calculated;
    return `<div class="metric-item${isBmiCalc ? ' bmi-calc' : ''}">
      <div class="metric-label">${f.l}</div>
      <div class="metric-value">${d[f.k]}<span class="metric-unit">${f.u}</span></div>
      ${isBmiCalc ? '<div class="metric-tag">키·몸무게 계산</div>' : '<div class="ocr-tag">OCR 인식</div>'}
    </div>`;
  }).join('') || '<div style="color:var(--text-muted);font-size:13px">수치를 추출하지 못했습니다</div>';

  let qualityHTML = '';
  const q = data.quality_report;
  if (q && currentType === 'image') {
    qualityHTML = `<div class="quality-card">
      <div class="result-card-title">이미지 품질</div>
      <div class="quality-row"><span class="quality-key">상태</span><span class="quality-val">${q.status === 'good' ? '✅ 양호' : '⚠️ ' + q.message}</span></div>
      ${q.blur_score != null ? `<div class="quality-row"><span class="quality-key">선명도</span><span class="quality-val">${q.blur_score.toFixed(1)}</span></div>` : ''}
      ${q.brightness != null ? `<div class="quality-row"><span class="quality-key">밝기</span><span class="quality-val">${q.brightness.toFixed(1)}</span></div>` : ''}
      ${q.skew_angle != null ? `<div class="quality-row"><span class="quality-key">기울기</span><span class="quality-val">${q.skew_angle.toFixed(1)}°</span></div>` : ''}
      ${(q.guide||[]).length ? `<div style="margin-top:10px;font-size:11px;color:var(--text-muted);line-height:1.7;">${q.guide.map(g=>'• '+g).join('<br>')}</div>` : ''}
    </div>`;
  }

  const lowConfHTML = (data.low_confidence_fields||[]).length
    ? `<div class="confirm-banner">⚠️ 신뢰도 낮은 항목 (확인 필요): ${data.low_confidence_fields.join(', ')}</div>` : '';

  el.innerHTML = `
  <div class="result-header">
    <h3>수치 추출 결과</h3>
    <span class="badge ${badgeCls}">${extracted.length}개 항목</span>
    <span class="badge badge-info" style="margin-left:auto;">${currentType.toUpperCase()}</span>
  </div>
  <div class="result-card">
    <div class="result-card-title">4대 만성질환 관련 수치</div>
    ${extracted.length ? `<div class="metric-grid">${gridHTML}</div>` : gridHTML}
  </div>
  ${qualityHTML}
  ${lowConfHTML}
  <div class="confirm-banner info-banner">ℹ️ 수치만 추출합니다. 정상/비정상 판정은 제공하지 않습니다.</div>
  ${jsonToggle(data)}
  <button class="btn-save" onclick="alert('→ POST /api/v1/health/records/ 연동 예정')">💾 건강정보 저장 (HEALTH)</button>`;
  el.classList.add('visible');
}

function jsonToggle(d) {
  return `<div class="json-toggle">
    <div class="json-toggle-header" onclick="this.nextElementSibling.classList.toggle('open')">
      <span>🔧 원본 응답 (개발용)</span><span>▾</span>
    </div>
    <div class="json-body"><pre>${JSON.stringify(d, null, 2)}</pre></div>
  </div>`;
}
function loadingHTML() {
  return `<div class="loading-box"><div class="spinner"></div><div class="loading-text">OCR 분석 중<span class="loading-dots"></span></div><div style="font-size:11px;color:var(--text-dim)">PaddleOCR · FastAPI 백엔드</div></div>`;
}
function errorHTML(msg) {
  return `<div class="result-card" style="border-color:rgba(247,129,102,0.4)">
    <div style="color:var(--accent3);font-size:14px;font-weight:600;margin-bottom:8px">❌ 분석 실패</div>
    <div style="font-size:13px;color:var(--text-muted)">${msg}</div>
    <div style="font-size:11px;color:var(--text-dim);margin-top:8px">서버 연결 상태를 확인하거나 파일을 다시 선택해보세요.</div>
  </div>`;
}
</script>
</body>
</html>
